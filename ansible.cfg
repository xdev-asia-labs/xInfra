[defaults]
# Default inventory for postgres ops (backward compat)
# For full infra: -i inventory/production/hosts.yml
inventory              = inventory/hosts.yml
roles_path             = roles:cookbooks/kvm-cockpit-vxlan-cookbook/roles:cookbooks/kafka-cookbook/roles:cookbooks/kubernetes-cookbook/roles:cookbooks/seaweedfs-cookbook/roles
host_key_checking      = True
retry_files_enabled    = False
gathering              = smart
fact_caching           = jsonfile
fact_caching_connection = /tmp/xinfra_facts_cache
fact_caching_timeout   = 86400
stdout_callback        = yaml
forks                  = 10
timeout                = 30
log_path               = ./ansible.log

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
