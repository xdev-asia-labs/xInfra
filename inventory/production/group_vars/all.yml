---
# Global variables — apply to ALL hosts in production
# Loaded from .env: export $(cat .env | grep -v '^#' | xargs)

ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
ansible_python_interpreter: /usr/bin/python3

timezone: "{{ lookup('env', 'TIMEZONE') | default('Asia/Ho_Chi_Minh') }}"

ntp_servers:
  - 0.asia.pool.ntp.org
  - 1.asia.pool.ntp.org
  - 2.asia.pool.ntp.org

dns_servers:
  - 8.8.8.8
  - 8.8.4.4

firewall_enabled: true
firewall_type: ufw
