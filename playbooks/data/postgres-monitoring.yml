---
# playbooks/data/postgres-monitoring.yml
# Deploy Prometheus + Grafana monitoring for PostgreSQL cluster
#
# Usage:
#   ansible-playbook playbooks/data/postgres-monitoring.yml

- name: Deploy Prometheus
  hosts: postgres[0]
  become: yes
  roles:
    - role: prometheus
      tags: prometheus

- name: Deploy Grafana
  hosts: postgres[0]
  become: yes
  roles:
    - role: grafana
      tags: grafana
