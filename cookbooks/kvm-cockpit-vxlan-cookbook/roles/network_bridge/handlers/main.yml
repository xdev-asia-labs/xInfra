---
- name: apply netplan
  command: netplan apply
  async: 30
  poll: 0

- name: Wait for network to stabilize
  wait_for:
    timeout: 5

- name: Verify bridge exists
  command: ip addr show {{ bridge_name }}
  register: bridge_verify
  changed_when: false

- name: Display bridge configuration
  debug:
    msg: "{{ bridge_verify.stdout_lines }}"
