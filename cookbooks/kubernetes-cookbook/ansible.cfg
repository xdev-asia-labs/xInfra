[defaults]
host_key_checking = False
inventory = inventory/hosts.yml
remote_user = root
roles_path = roles
forks = 10
timeout = 30
log_path = ansible.log

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
