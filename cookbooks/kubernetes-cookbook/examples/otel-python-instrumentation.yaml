---
# Example: Python FastAPI application with OpenTelemetry auto-instrumentation
# This example shows how to instrument a Python application to send traces to Tempo

apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api-service
  namespace: default
  labels:
    app: python-api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-api-service
  template:
    metadata:
      labels:
        app: python-api-service
    spec:
      containers:
        - name: api
          image: your-registry/python-api:latest
          ports:
            - name: http
              containerPort: 8000
          
          env:
            # ========================================
            # OpenTelemetry Configuration
            # ========================================
            
            - name: OTEL_SERVICE_NAME
              value: "python-api-service"
            
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,k8s.namespace.name=$(NAMESPACE),k8s.pod.name=$(POD_NAME)"
            
            # Python-specific instrumentation
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: "true"
            
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            
            # Kubernetes metadata
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            
            # Application config
            - name: APP_ENV
              value: "production"
          
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
