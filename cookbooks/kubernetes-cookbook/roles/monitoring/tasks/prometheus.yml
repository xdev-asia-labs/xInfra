---
# Prometheus installation tasks

- name: Check if Prometheus is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/prometheus
  register: prometheus_binary

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: "0644"
  when: not prometheus_binary.stat.exists

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp
    remote_src: true
  when: not prometheus_binary.stat.exists

- name: Copy Prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: prometheus
    group: monitoring
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool
  when: not prometheus_binary.stat.exists

- name: Copy Prometheus console files
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/etc/prometheus/{{ item }}"
    owner: prometheus
    group: monitoring
    mode: "0755"
    remote_src: true
  loop:
    - consoles
    - console_libraries
  when: not prometheus_binary.stat.exists

- name: Create Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: monitoring
    mode: "0644"
  notify: restart prometheus

- name: Create Prometheus systemd service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify: restart prometheus

- name: Enable and start Prometheus service
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Prometheus to be ready
  ansible.builtin.uri:
    url: "http://localhost:9090/-/ready"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 12
  delay: 5

- name: Cleanup Prometheus installation files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/prometheus.tar.gz
    - "/tmp/prometheus-{{ prometheus_version }}.linux-amd64"
