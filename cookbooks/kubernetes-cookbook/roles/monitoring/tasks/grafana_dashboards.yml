---
# Grafana provisioning tasks
# Auto-provision data sources and dashboards

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: monitoring
    mode: "0755"
  loop:
    - /etc/grafana/provisioning
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards
    - /var/lib/grafana/dashboards

- name: Fix datasource UIDs in Grafana database (ensure consistent UIDs)
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import sqlite3, os
    db = "/var/lib/grafana/grafana.db"
    if not os.path.exists(db):
        print("No grafana.db yet - skipping")
        exit(0)
    conn = sqlite3.connect(db)
    c = conn.cursor()
    uid_map = {"Prometheus": "prometheus", "Loki": "loki", "Tempo": "tempo"}
    changed = False
    for name, uid in uid_map.items():
        c.execute("SELECT uid FROM data_source WHERE name = ?", (name,))
        row = c.fetchone()
        if row and row[0] != uid:
            c.execute("UPDATE data_source SET uid = ? WHERE name = ?", (uid, name))
            print(f"Updated {name}: {row[0]} -> {uid}")
            changed = True
    if changed:
        conn.commit()
        print("UIDs updated")
    else:
        print("UIDs already correct")
    conn.close()
    PYEOF
  changed_when: false

- name: Provision Prometheus data source
  ansible.builtin.copy:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://localhost:9090
          isDefault: true
          editable: true
          jsonData:
            timeInterval: '15s'
            httpMethod: POST
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: grafana
    group: monitoring
    mode: "0644"
  notify: restart grafana

- name: Provision Loki data source (with Tempo trace linking)
  ansible.builtin.copy:
    content: |
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://localhost:3100
          editable: true
          jsonData:
            maxLines: 1000
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: '(?:trace_id|traceId|traceID|TraceId|traceid)[=: ]+"?(\w+)"?'
                name: TraceID
                url: '$${__value.raw}'
                urlDisplayLabel: 'View Trace'
              - datasourceUid: tempo
                matcherRegex: '(?:span_id|spanId|spanID|SpanId)[=: ]+"?(\w+)"?'
                name: SpanID
                url: ''
    dest: /etc/grafana/provisioning/datasources/loki.yml
    owner: grafana
    group: monitoring
    mode: "0644"
  notify: restart grafana

- name: Provision Tempo data source (with Loki & Prometheus linking)
  ansible.builtin.copy:
    content: |
      apiVersion: 1
      datasources:
        - name: Tempo
          type: tempo
          uid: tempo
          access: proxy
          url: http://localhost:3200
          editable: true
          jsonData:
            httpMethod: GET
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: '-1h'
              spanEndTimeShift: '1h'
              filterByTraceID: true
              filterBySpanID: true
              customQuery: true
              query: '{$${__tags}} |= "$${__trace.traceId}"'
            tracesToMetrics:
              datasourceUid: prometheus
              spanStartTimeShift: '-1h'
              spanEndTimeShift: '1h'
              tags:
                - key: service.name
                  value: service_name
              queries:
                - name: 'Request rate'
                  query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))'
                - name: 'Error rate'
                  query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags, status_code="STATUS_CODE_ERROR"}[5m]))'
                - name: 'P95 latency'
                  query: 'histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le))'
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            search:
              hide: false
            lokiSearch:
              datasourceUid: loki
            traceQuery:
              timeShiftEnabled: true
              spanStartTimeShift: '1h'
              spanEndTimeShift: '-1h'
    dest: /etc/grafana/provisioning/datasources/tempo.yml
    owner: grafana
    group: monitoring
    mode: "0644"
  notify: restart grafana

- name: Provision dashboard provider
  ansible.builtin.copy:
    content: |
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          updateIntervalSeconds: 30
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards
            foldersFromFilesStructure: false
    dest: /etc/grafana/provisioning/dashboards/default.yml
    owner: grafana
    group: monitoring
    mode: "0644"
  notify: restart grafana

