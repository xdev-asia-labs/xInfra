- name: Fix datasource references in all downloaded dashboards
  ansible.builtin.shell: |
    for f in /var/lib/grafana/dashboards/node-exporter-full.json \
             /var/lib/grafana/dashboards/k8s-cluster-monitoring.json \
             /var/lib/grafana/dashboards/k8s-cluster-prometheus.json \
             /var/lib/grafana/dashboards/prometheus-stats.json \
             /var/lib/grafana/dashboards/loki-logs.json \
             /var/lib/grafana/dashboards/loki-promtail.json \
             /var/lib/grafana/dashboards/otel-collector.json; do
      [ -f "$f" ] || continue
      python3 -c "
    import json
    with open('$f', 'r') as fh:
        content = fh.read()
    content = content.replace('\${DS_PROMETHEUS}', 'prometheus')
    content = content.replace('\${DS_LOKI}', 'loki')
    content = content.replace('\${DS_TEMPO}', 'tempo')
    data = json.loads(content)
    data['id'] = None
    for key in ['__inputs', '__requires', '__elements']:
        data.pop(key, None)
    def fix_ds(obj):
        if isinstance(obj, dict):
            if 'datasource' in obj:
                ds = obj['datasource']
                if isinstance(ds, str):
                    dl = ds.lower()
                    if 'prometheus' in dl or ds == 'prometheus':
                        obj['datasource'] = {'uid': 'prometheus', 'type': 'prometheus'}
                    elif 'loki' in dl:
                        obj['datasource'] = {'uid': 'loki', 'type': 'loki'}
                    elif 'tempo' in dl:
                        obj['datasource'] = {'uid': 'tempo', 'type': 'tempo'}
                elif isinstance(ds, dict):
                    ds_type = ds.get('type', '')
                    if 'uid' not in ds or ds.get('uid','').startswith('\$'):
                        if 'prometheus' in ds_type:
                            ds['uid'] = 'prometheus'
                        elif 'loki' in ds_type:
                            ds['uid'] = 'loki'
                        elif 'tempo' in ds_type:
                            ds['uid'] = 'tempo'
            for v in obj.values():
                fix_ds(v)
        elif isinstance(obj, list):
            for item in obj:
                fix_ds(item)
    fix_ds(data)
    with open('$f', 'w') as fh:
        json.dump(data, fh, indent=2)
    " 2>/dev/null || true
    done
  changed_when: true

- name: Fix datasource UID references in all dashboards
  ansible.builtin.shell: |
    for f in /var/lib/grafana/dashboards/*.json; do
      python3 -c "
    import json
    with open('$f', 'r') as fh:
        data = json.load(fh)
    data['id'] = None
    for key in ['__inputs', '__requires', '__elements']:
        data.pop(key, None)
    with open('$f', 'w') as fh:
        json.dump(data, fh, indent=2)
    " 2>/dev/null || true
    done
  changed_when: true

- name: Remove old broken dashboard files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/grafana/dashboards/tempo-apm.json
  ignore_errors: true
