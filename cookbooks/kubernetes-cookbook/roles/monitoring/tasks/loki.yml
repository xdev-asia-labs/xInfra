---
# Loki installation tasks - centralized log aggregation

- name: Create loki user
  ansible.builtin.user:
    name: loki
    group: monitoring
    shell: /bin/false
    system: true
    create_home: false

- name: Create Loki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: monitoring
    mode: "0755"
  loop:
    - /etc/loki
    - /var/lib/loki
    - /var/lib/loki/chunks
    - /var/lib/loki/boltdb-shipper-active
    - /var/lib/loki/boltdb-shipper-cache
    - /var/lib/loki/tsdb-shipper-active
    - /var/lib/loki/tsdb-shipper-cache
    - /var/lib/loki/rules
    - /var/lib/loki/compactor

- name: Check current Loki version
  ansible.builtin.shell: /usr/local/bin/loki --version 2>&1 | head -1 || echo 'not installed'
  register: loki_current_version
  changed_when: false
  failed_when: false

- name: Set Loki upgrade needed
  ansible.builtin.set_fact:
    loki_needs_upgrade: "{{ loki_version not in (loki_current_version.stdout | default('')) }}"

- name: Stop Loki before upgrade
  ansible.builtin.systemd:
    name: loki
    state: stopped
  when: loki_needs_upgrade | bool
  ignore_errors: true

- name: Install unzip if not present
  ansible.builtin.package:
    name: unzip
    state: present

- name: Download Loki {{ loki_version }}
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
    dest: /tmp/loki.zip
    mode: "0644"
  when: loki_needs_upgrade | bool

- name: Extract Loki
  ansible.builtin.unarchive:
    src: /tmp/loki.zip
    dest: /tmp
    remote_src: true
  when: loki_needs_upgrade | bool

- name: Install Loki binary
  ansible.builtin.copy:
    src: /tmp/loki-linux-amd64
    dest: /usr/local/bin/loki
    owner: loki
    group: monitoring
    mode: "0755"
    remote_src: true
  when: loki_needs_upgrade | bool
  notify: restart loki

- name: Create Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: /etc/loki/loki-config.yml
    owner: loki
    group: monitoring
    mode: "0644"
  notify: restart loki

- name: Create Loki systemd service
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify: restart loki

- name: Enable and start Loki service
  ansible.builtin.systemd:
    name: loki
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Loki to be ready
  ansible.builtin.uri:
    url: "http://localhost:3100/ready"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 5

- name: Cleanup Loki installation files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/loki.zip
    - /tmp/loki-linux-amd64
